<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SmartAss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #222222;
            --text-secondary: #999999;
            --green: #C2FF66;
            --yellow: #FFDB77;
            --red: #FF8383;
            --border: #e8e8e8;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 2rem 1.5rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .search-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-bar {
            display: flex;
            gap: 0;
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .search-bar:focus-within { border-color: #bbb; }

        .search-bar input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            background: var(--bg);
            color: var(--text);
        }

        .search-bar input::placeholder { color: #bbb; }

        .search-btn {
            padding: 0.75rem 1.3rem;
            background: var(--text);
            color: var(--bg);
            border: none;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
        }

        .search-btn:hover { background: #444; }

        .random-btn {
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        .random-btn:hover { background: #444; }
        .random-btn:active { transform: scale(0.98); }

        .fact-area {
            width: 100%;
            margin-bottom: 2rem;
        }

        .fact-area:empty { margin-bottom: 0; }

        .fact-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.4rem 1.3rem;
            text-align: left;
            animation: fadeIn 0.3s ease both;
            border: 1.5px solid var(--border);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fact-text {
            font-size: 0.92rem;
            line-height: 1.65;
            margin-bottom: 1.1rem;
            color: var(--text);
        }

        .fact-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .credibility {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .cred-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cred-high .cred-dot { background: var(--green); }
        .cred-medium .cred-dot { background: var(--yellow); }
        .cred-low .cred-dot { background: var(--red); }
        .cred-high .cred-label { font-weight: 600; }
        .cred-medium .cred-label { font-weight: 600; }
        .cred-low .cred-label { font-weight: 600; }

        .source-link {
            color: #5588cc;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .source-link:hover { opacity: 0.7; text-decoration: underline; }

        .related-section {
            margin-top: 1.2rem;
            text-align: center;
        }

        .related-label {
            font-size: 0.68rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .related-topics {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem;
        }

        .topic-pill {
            background: var(--bg);
            border: 1.5px solid var(--border);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.73rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }

        .topic-pill:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 2rem 0;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid var(--border);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 0.8rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            color: var(--text-secondary);
            font-size: 0.88rem;
            padding: 1.5rem 0;
        }

        .wiki-note {
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: #FFF8EC;
            border: 1px solid var(--yellow);
            border-radius: var(--radius);
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.8rem;
            line-height: 1.4;
            text-align: left;
        }

        /* AUTH BAR */
        .auth-bar {
            position: fixed; top: 0; right: 0; left: 0;
            padding: 0.6rem 1rem;
            display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem;
            z-index: 100;
        }
        .auth-btn {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.4rem 0.9rem; border-radius: 20px;
            border: 1.5px solid var(--border); background: white;
            font-size: 0.75rem; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.15s; color: var(--text);
        }
        .auth-btn:hover { border-color: var(--text); }
        .auth-avatar {
            width: 26px; height: 26px; border-radius: 50%;
            cursor: pointer; border: 2px solid var(--border);
            transition: border-color 0.15s;
        }
        .auth-avatar:hover { border-color: var(--text); }

        /* FACT ACTION BUTTONS */
        .fact-actions {
            display: flex; gap: 0.4rem; margin-top: 0.8rem; padding-top: 0.8rem;
            border-top: 1px solid var(--border);
        }
        .fact-action-btn {
            display: flex; align-items: center; gap: 0.3rem;
            padding: 0.3rem 0.7rem; border-radius: 20px;
            border: 1.5px solid var(--border); background: white;
            font-size: 0.72rem; font-weight: 500; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.15s; color: var(--text-secondary);
        }
        .fact-action-btn:hover { border-color: var(--text); color: var(--text); }
        .fact-action-btn.saved { background: var(--green); border-color: var(--green); color: var(--text); }

        /* PROFILE PANEL */
        .profile-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); z-index: 200;
            display: none; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .profile-overlay.open { display: flex; }
        .profile-panel {
            background: white; border-radius: 16px; width: 100%; max-width: 440px;
            max-height: 85vh; overflow-y: auto; padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            animation: fadeIn 0.2s ease;
        }
        .profile-header {
            display: flex; align-items: center; gap: 0.8rem;
            margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .profile-photo {
            width: 48px; height: 48px; border-radius: 50%;
        }
        .profile-name { font-size: 1rem; font-weight: 700; }
        .profile-email { font-size: 0.75rem; color: var(--text-secondary); }
        .profile-tab-bar {
            display: flex; gap: 0; background: #f5f5f5; border-radius: 8px;
            margin-bottom: 1rem; overflow: hidden;
        }
        .profile-tab {
            flex: 1; padding: 0.5rem; font-size: 0.75rem; font-weight: 600;
            text-align: center; border: none; background: transparent;
            cursor: pointer; font-family: 'Inter', sans-serif;
            color: var(--text-secondary); transition: all 0.15s;
        }
        .profile-tab.active { background: var(--text); color: white; border-radius: 8px; }
        .profile-section { display: none; }
        .profile-section.active { display: block; }
        .saved-fact-item {
            padding: 0.7rem; margin-bottom: 0.4rem;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.82rem; line-height: 1.5;
            display: flex; gap: 0.5rem; align-items: flex-start;
        }
        .saved-fact-text { flex: 1; }
        .saved-fact-remove {
            background: none; border: none; cursor: pointer;
            font-size: 0.8rem; color: var(--text-secondary); padding: 0.2rem;
        }
        .saved-fact-remove:hover { color: var(--red); }
        .inbox-item {
            padding: 0.8rem; margin-bottom: 0.5rem;
            border: 1px solid var(--border); border-radius: 8px;
            animation: fadeIn 0.2s ease;
        }
        .inbox-item.unread { border-left: 3px solid var(--green); background: #f9fff0; }
        .inbox-from { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.3rem; font-weight: 600; }
        .inbox-text { font-size: 0.82rem; line-height: 1.5; margin-bottom: 0.4rem; }
        .inbox-actions { display: flex; gap: 0.3rem; }
        .profile-close {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; font-size: 1.2rem;
            cursor: pointer; color: var(--text-secondary); padding: 0.3rem;
        }
        .profile-close:hover { color: var(--text); }
        .inbox-badge {
            background: var(--red); color: white; border-radius: 10px;
            font-size: 0.6rem; font-weight: 700; padding: 0.1rem 0.35rem;
            min-width: 16px; text-align: center; line-height: 1.2;
        }

        /* SHARE MODAL */
        .share-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); z-index: 300;
            display: none; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .share-modal.open { display: flex; }
        .share-box {
            background: white; border-radius: 12px; padding: 1.5rem;
            width: 100%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .share-box h3 { font-size: 0.95rem; margin-bottom: 0.8rem; }
        .share-input {
            width: 100%; padding: 0.6rem 0.8rem; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 0.82rem; font-family: 'Inter', sans-serif;
            outline: none; margin-bottom: 0.6rem;
        }
        .share-input:focus { border-color: var(--text); }
        .share-actions { display: flex; gap: 0.4rem; justify-content: flex-end; }
        .share-status { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; min-height: 1.2em; }

        @media (max-width: 500px) {
            .fact-footer { flex-direction: column; align-items: flex-start; }
            .profile-panel { max-height: 90vh; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <!-- AUTH BAR -->
    <div class="auth-bar">
        <div id="authArea">
            <button class="auth-btn" id="loginBtn" onclick="googleLogin()">
                <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Logga in
            </button>
        </div>
    </div>

    <!-- PROFILE PANEL -->
    <div class="profile-overlay" id="profileOverlay" onclick="if(event.target===this)closeProfile()">
        <div class="profile-panel" style="position:relative;">
            <button class="profile-close" onclick="closeProfile()">✕</button>
            <div class="profile-header">
                <img class="profile-photo" id="profilePhoto" src="" alt="">
                <div>
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-email" id="profileEmail"></div>
                </div>
            </div>
            <div class="profile-tab-bar">
                <button class="profile-tab active" data-ptab="saved" onclick="switchProfileTab('saved')">❤️ Sparade</button>
                <button class="profile-tab" data-ptab="inbox" onclick="switchProfileTab('inbox')">📩 Inbox <span id="inboxBadge" class="inbox-badge" style="display:none;">0</span></button>
            </div>
            <div class="profile-section active" id="psec-saved">
                <div id="savedList"></div>
            </div>
            <div class="profile-section" id="psec-inbox">
                <div id="inboxList"></div>
            </div>
            <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border); text-align:center;">
                <button class="auth-btn" onclick="logOut()" style="color:var(--red); border-color:var(--red);">Logga ut</button>
            </div>
        </div>
    </div>

    <!-- SHARE MODAL -->
    <div class="share-modal" id="shareModal" onclick="if(event.target===this)closeShare()">
        <div class="share-box">
            <h3>📩 Skicka till en vän</h3>
            <p style="font-size:0.78rem; color:var(--text-secondary); margin-bottom:0.8rem;" id="sharePreview"></p>
            <input class="share-input" id="shareEmail" type="email" placeholder="Vännens e-postadress...">
            <div class="share-status" id="shareStatus"></div>
            <div class="share-actions">
                <button class="auth-btn" onclick="closeShare()">Avbryt</button>
                <button class="auth-btn" onclick="sendFact()" style="background:var(--text); color:white; border-color:var(--text);">Skicka</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="fact-area" id="factArea"></div>

        <div class="search-section">
            <button type="button" class="random-btn" id="randomBtn">Berätta något jag inte vet</button>
            <form class="search-bar" id="searchForm">
                <input type="text" id="searchInput" placeholder="Jag vill veta något kul om..." autocomplete="off">
                <button type="submit" class="search-btn">Sök</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        // ===== FIREBASE CONFIG — Fill in your project details =====
        const firebaseConfig = {
            apiKey: "AIzaSyB564DfemBIPMrKxV544OsqLB6x8wgpu4",
            authDomain: "smartass-54b33.firebaseapp.com",
            projectId: "smartass-54b33",
            storageBucket: "smartass-54b33.firebasestorage.app",
            messagingSenderId: "802864537973",
            appId: "1:802864537973:web:bfea158ded445ff04fb33c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        // ===== AUTH =====
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => {
                console.error("Login error:", e);
                alert("Inloggning misslyckades. Försök igen!");
            });
        }

        function logOut() {
            auth.signOut();
            closeProfile();
        }

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            const area = document.getElementById("authArea");

            if (user) {
                // Save/update user doc
                await db.collection("users").doc(user.uid).set({
                    name: user.displayName || "",
                    email: user.email || "",
                    photo: user.photoURL || "",
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                area.innerHTML = `
                    <span id="inboxDot" style="display:none;width:8px;height:8px;border-radius:50%;background:var(--red);"></span>
                    <img class="auth-avatar" src="${user.photoURL || ''}" alt="${user.displayName || ''}"
                         onclick="openProfile()" referrerpolicy="no-referrer">
                `;
                loadInboxCount();
            } else {
                area.innerHTML = `
                    <button class="auth-btn" id="loginBtn" onclick="googleLogin()">
                        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Logga in
                    </button>
                `;
            }
            // Re-render current fact if showing (to add/remove action buttons)
            if (currentFacts.length > 0) renderSingleFact();
        });

        // ===== PROFILE =====
        function openProfile() {
            if (!currentUser) return;
            document.getElementById("profilePhoto").src = currentUser.photoURL || "";
            document.getElementById("profileName").textContent = currentUser.displayName || "Användare";
            document.getElementById("profileEmail").textContent = currentUser.email || "";
            document.getElementById("profileOverlay").classList.add("open");
            loadSavedFacts();
            loadInbox();
        }

        function closeProfile() {
            document.getElementById("profileOverlay").classList.remove("open");
        }

        function switchProfileTab(tab) {
            document.querySelectorAll(".profile-tab").forEach(t => t.classList.remove("active"));
            document.querySelector(`[data-ptab="${tab}"]`).classList.add("active");
            document.querySelectorAll(".profile-section").forEach(s => s.classList.remove("active"));
            document.getElementById(`psec-${tab}`).classList.add("active");
            if (tab === "inbox") loadInbox();
            if (tab === "saved") loadSavedFacts();
        }

        // ===== SAVED FACTS =====
        async function toggleSaveFact(fact) {
            if (!currentUser) { googleLogin(); return; }
            const ref = db.collection("users").doc(currentUser.uid).collection("saved");
            const key = (fact.text || "").slice(0, 80);

            const existing = await ref.where("key", "==", key).get();
            if (!existing.empty) {
                existing.forEach(doc => doc.ref.delete());
            } else {
                await ref.add({
                    key,
                    text: fact.text,
                    category: fact.category || "",
                    sourceName: fact.sourceName || "",
                    sourceUrl: fact.sourceUrl || "",
                    savedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            renderSingleFact();
        }

        async function isFactSavedByUser(fact) {
            if (!currentUser) return false;
            const key = (fact.text || "").slice(0, 80);
            const snap = await db.collection("users").doc(currentUser.uid)
                .collection("saved").where("key", "==", key).get();
            return !snap.empty;
        }

        async function loadSavedFacts() {
            if (!currentUser) return;
            const snap = await db.collection("users").doc(currentUser.uid)
                .collection("saved").orderBy("savedAt", "desc").get();

            const list = document.getElementById("savedList");
            if (snap.empty) {
                list.innerHTML = `<p style="color:var(--text-secondary);text-align:center;padding:1.5rem;font-size:0.82rem;">Inga sparade fakta ännu. Tryck ❤️ på en fakta för att spara den!</p>`;
                return;
            }

            list.innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                return `<div class="saved-fact-item">
                    <div class="saved-fact-text">${escapeHtml(d.text)}</div>
                    <button class="saved-fact-remove" onclick="removeSaved('${doc.id}')" title="Ta bort">✕</button>
                </div>`;
            }).join("");
        }

        async function removeSaved(docId) {
            if (!currentUser) return;
            await db.collection("users").doc(currentUser.uid).collection("saved").doc(docId).delete();
            loadSavedFacts();
            if (currentFacts.length > 0) renderSingleFact();
        }

        // ===== SHARE / INBOX =====
        let factToShare = null;

        function openShare(fact) {
            if (!currentUser) { googleLogin(); return; }
            factToShare = fact;
            document.getElementById("sharePreview").textContent = `"${(fact.text || "").slice(0, 120)}${fact.text.length > 120 ? '...' : ''}"`;
            document.getElementById("shareEmail").value = "";
            document.getElementById("shareStatus").textContent = "";
            document.getElementById("shareModal").classList.add("open");
            document.getElementById("shareEmail").focus();
        }

        function closeShare() {
            document.getElementById("shareModal").classList.remove("open");
            factToShare = null;
        }

        async function sendFact() {
            if (!currentUser || !factToShare) return;
            const email = document.getElementById("shareEmail").value.trim().toLowerCase();
            const status = document.getElementById("shareStatus");

            if (!email || !email.includes("@")) {
                status.textContent = "Ange en giltig e-postadress.";
                status.style.color = "var(--red)";
                return;
            }

            // Find recipient by email
            const userSnap = await db.collection("users").where("email", "==", email).get();
            if (userSnap.empty) {
                status.textContent = "Ingen användare med den adressen hittades. De måste logga in på SmartAss först!";
                status.style.color = "var(--red)";
                return;
            }

            const recipientId = userSnap.docs[0].id;
            if (recipientId === currentUser.uid) {
                status.textContent = "Du kan inte skicka till dig själv!";
                status.style.color = "var(--red)";
                return;
            }

            try {
                await db.collection("users").doc(recipientId).collection("inbox").add({
                    fromUid: currentUser.uid,
                    fromName: currentUser.displayName || "Anonym",
                    fromPhoto: currentUser.photoURL || "",
                    text: factToShare.text,
                    category: factToShare.category || "",
                    sourceName: factToShare.sourceName || "",
                    sourceUrl: factToShare.sourceUrl || "",
                    read: false,
                    sentAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                status.textContent = "✅ Skickat!";
                status.style.color = "var(--green)";
                setTimeout(closeShare, 1500);
            } catch (e) {
                status.textContent = "Något gick fel. Försök igen!";
                status.style.color = "var(--red)";
            }
        }

        async function loadInbox() {
            if (!currentUser) return;
            const snap = await db.collection("users").doc(currentUser.uid)
                .collection("inbox").orderBy("sentAt", "desc").get();

            const list = document.getElementById("inboxList");
            if (snap.empty) {
                list.innerHTML = `<p style="color:var(--text-secondary);text-align:center;padding:1.5rem;font-size:0.82rem;">Ingen post ännu. Be en vän skicka en kul fakta!</p>`;
                return;
            }

            list.innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                const unread = !d.read;
                return `<div class="inbox-item ${unread ? 'unread' : ''}">
                    <div class="inbox-from">
                        ${d.fromPhoto ? `<img src="${d.fromPhoto}" style="width:16px;height:16px;border-radius:50%;vertical-align:middle;margin-right:4px;" referrerpolicy="no-referrer">` : ''}
                        ${escapeHtml(d.fromName)} skickade:
                    </div>
                    <div class="inbox-text">${escapeHtml(d.text)}</div>
                    <div class="inbox-actions">
                        <button class="fact-action-btn" onclick="saveFromInbox('${doc.id}')">❤️ Spara</button>
                        <button class="fact-action-btn" onclick="deleteInbox('${doc.id}')">🗑 Ta bort</button>
                    </div>
                </div>`;
            }).join("");

            // Mark all as read
            snap.docs.filter(d => !d.data().read).forEach(doc => {
                doc.ref.update({ read: true });
            });
            updateInboxBadge(0);
        }

        async function loadInboxCount() {
            if (!currentUser) return;
            const snap = await db.collection("users").doc(currentUser.uid)
                .collection("inbox").where("read", "==", false).get();
            updateInboxBadge(snap.size);
        }

        function updateInboxBadge(count) {
            const badge = document.getElementById("inboxBadge");
            const dot = document.getElementById("inboxDot");
            if (badge) {
                badge.textContent = count;
                badge.style.display = count > 0 ? "inline" : "none";
            }
            if (dot) dot.style.display = count > 0 ? "inline-block" : "none";
        }

        async function saveFromInbox(docId) {
            if (!currentUser) return;
            const doc = await db.collection("users").doc(currentUser.uid).collection("inbox").doc(docId).get();
            if (!doc.exists) return;
            const d = doc.data();
            await db.collection("users").doc(currentUser.uid).collection("saved").add({
                key: (d.text || "").slice(0, 80),
                text: d.text,
                category: d.category || "",
                sourceName: d.sourceName || "",
                sourceUrl: d.sourceUrl || "",
                savedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await doc.ref.delete();
            loadInbox();
            loadSavedFacts();
        }

        async function deleteInbox(docId) {
            if (!currentUser) return;
            await db.collection("users").doc(currentUser.uid).collection("inbox").doc(docId).delete();
            loadInbox();
        }
    </script>

    <script src="facts.js"></script>
    <script>
        // ========== SEEN FACTS TRACKER (localStorage) ==========
        const SEEN_KEY = "smartass_seen";
        const SEEN_EXPIRY_DAYS = 7;

        function getSeenFacts() {
            try {
                const data = JSON.parse(localStorage.getItem(SEEN_KEY) || "{}");
                const now = Date.now();
                const cutoff = now - SEEN_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
                const cleaned = {};
                for (const [key, ts] of Object.entries(data)) {
                    if (ts > cutoff) cleaned[key] = ts;
                }
                if (Object.keys(cleaned).length !== Object.keys(data).length) {
                    localStorage.setItem(SEEN_KEY, JSON.stringify(cleaned));
                }
                return cleaned;
            } catch { return {}; }
        }

        function markFactSeen(fact) {
            try {
                const data = getSeenFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(SEEN_KEY, JSON.stringify(data));
            } catch {}
        }

        function factId(fact) {
            return (fact.text || "").slice(0, 80);
        }

        function isFactSeen(fact) {
            return !!getSeenFacts()[factId(fact)];
        }

        // ========== INSTITUTIONAL API SOURCES ==========
        const API_SOURCES = {
            async nasaApod() {

                    text: d.explanation.split('. ').find(s => s.length > 40 && s.length < 200) || d.explanation.split('. ').slice(0, 1).join('. ') + ".",
                    sourceName: "NASA (APOD)",
                    sourceUrl: d.url || "https://apod.nasa.gov/",
                    credibility: "high",
                    keywords: ["rymden", "astronomi", "nasa", "foto"],
                    related: ["rymden", "stjärnor", "galaxer", "solsystemet"]

            async nasaAsteroids() {
                const today = new Date().toISOString().slice(0, 10);

                if (!res.ok) throw new Error(`NASA NEO: ${res.status}`);

                    const danger = neo.is_potentially_hazardous_asteroid ? "Klassad som potentiellt farlig!" : "Helt ofarlig för oss.";
                    return {
                        text: `Asteroiden ${neo.name.replace(/[()]/g, '')} passerar jorden idag! Den är ${minD}–${maxD} meter i diameter, färdas i ${speed.toLocaleString('sv')} km/h och passerar ${missLunar} månavstånd bort. ${danger}`,
                        sourceName: "NASA Center for Near Earth Object Studies",

                        keywords: ["asteroid", "rymden", "nasa", "jorden"],

                const res = await fetchWithTimeout("https://api.nobelprize.org/2.1/laureates?limit=25&offset=" + Math.floor(Math.random() * 900));

                    const year = prize.awardYear;
                    const cat = catSv[(prize.category?.en || "").toLowerCase()] || prize.category?.en || "";
                    const age = l.birth?.date ? (year - parseInt(l.birth.date)) : null;
                    const country = l.birth?.place?.country?.en || "";

            async restCountries() {
                const res = await fetchWithTimeout("https://restcountries.com/v3.1/all?fields=name,capital,population,area,region,subregion,languages,currencies,maps,landlocked,car");
                if (!res.ok) throw new Error(`REST Countries: ${res.status}`);

                    else if (langs.length >= 4) angles.push(`${name} har ${langs.length} officiella språk — bland annat ${langs.slice(0, 3).join(", ")}. Flerspråkig flex!`);

                const countries = ["SWE","USA","JPN","BRA","IND","CHN","DEU","FRA","NGA","AUS","KEN","MEX","EGY","ARG","THA","CAN","KOR","ZAF","GBR","NOR"];
                const cc = countries[Math.floor(Math.random() * countries.length)];
                const res = await fetchWithTimeout(`https://api.worldbank.org/v2/country/${cc}/indicator/${ind.id}?format=json&per_page=1&date=2020:2023`);
                if (!res.ok) throw new Error(`World Bank: ${res.status}`);
                const data = await res.json();
                const entry = data?.[1]?.[0];
                if (!entry?.value) return [];
                const val = ind.unit === "%" ? Math.round(entry.value) + "%" : Number(entry.value).toLocaleString('sv-SE') + ind.unit;
                return [{
                    text: `${entry.country.value} hade en ${ind.label} på ${val} (${entry.date}). Världsbankens data täcker 217 länder och används av forskare, journalister och beslutsfattare världen över.`,
                    sourceName: "Världsbanken (World Bank Open Data)",
                    sourceUrl: `https://data.worldbank.org/indicator/${ind.id}?locations=${cc}`,
                    credibility: "high",
                    keywords: ["ekonomi", "statistik", "världen", "data", "befolkning"],
                    related: ["ekonomi", "statistik", "geografi", "utveckling"]
                }];
            },

            async kSamsok() {
                const queries = ["viking", "runsten", "medeltid", "slott", "kyrka", "järnålder", "bronsålder", "skeppssättning", "hällristning"];
                const q = queries[Math.floor(Math.random() * queries.length)];
                const res = await fetchWithTimeout(`https://kulturarvsdata.se/ksamsok/api?method=search&query=text%3D${encodeURIComponent(q)}&recordSchema=presentation&startRecord=${Math.floor(Math.random()*50)+1}&maximumRecords=5`);
                if (!res.ok) throw new Error(`K-Samsök: ${res.status}`);
                const text = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const records = xml.querySelectorAll("record");
                const facts = [];
                records.forEach(rec => {
                    const pres = rec.querySelector("pres\\:item, item");
                    if (!pres) return;
                    const label = pres.querySelector("pres\\:itemLabel, itemLabel")?.textContent || "";
                    const desc = pres.querySelector("pres\\:description, description")?.textContent || "";
                    const type = pres.querySelector("pres\\:type, type")?.textContent || "";
                    if (!label && !desc) return;
                    facts.push({
                        text: `${label || "Kulturarvsföremål"}${type ? ` (${type})` : ""}: ${desc || "Ett svenskt kulturarvsföremål registrerat i Riksantikvarieämbetets databas K-Samsök."}`.slice(0, 300),
                        sourceName: "Riksantikvarieämbetet (K-Samsök)",
                        sourceUrl: "https://www.raa.se/hitta-information/k-samsok/",
                        credibility: "high",
                        keywords: ["kulturarv", "sverige", "historia", "arkeologi", q],
                        related: ["kulturarv", "Sverige", "historia", "vikingarna"]
                    });
                });
                return facts;
            }
        };

        // ========== HELPER FUNCTIONS ==========
        function credibilityLabel(level) {
            return level === "high" ? "Hög" : level === "medium" ? "Medel" : "Låg";
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        // Published facts — loaded from published-data.json (synced via admin)
        let _publishedFacts = [];
        async function loadPublishedFacts() {
            try {
                const res = await fetch("published-data.json?" + Date.now());
                if (res.ok) _publishedFacts = await res.json();
            } catch {}
        }
        function getAllFacts() {
            return _publishedFacts;
        }

        function searchCuratedFacts(topic) {
            const query = topic.toLowerCase().trim();
            const queryWords = query.split(/\s+/);
            const allFacts = getAllFacts();

            const scored = allFacts.map(fact => {
                let score = 0;
                for (const word of queryWords) {
                    for (const kw of fact.keywords) {
                        if (kw === query) score += 10;
                        else if (kw.includes(word) || word.includes(kw)) score += 5;
                        else if (kw.startsWith(word.slice(0, 3)) && word.length >= 3) score += 2;
                    }
                    if (fact.text.toLowerCase().includes(word)) score += 1;
                }
                return { fact, score };
            });

            return scored
                .filter(s => s.score >= 3)
                .sort((a, b) => b.score - a.score)
                .map(s => s.fact);
        }

        let currentFacts = [];
        let currentIndex = 0;
        let currentRelated = [];
        let currentTopic = "";
        let currentIsApi = false;

        // ========== API HELPERS ==========
        function fetchWithTimeout(url, timeoutMs = 5000) {
            return Promise.race([
                fetch(url),
                new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), timeoutMs))
            ]);
        }

        async function fetchRandomApiFact() {
            const sourceNames = Object.keys(API_SOURCES).sort(() => Math.random() - 0.5).slice(0, 3);
            const results = await Promise.allSettled(
                sourceNames.map(name => API_SOURCES[name]())
            );
            for (const r of results) {
                if (r.status === "fulfilled" && r.value.length > 0) {
                    const unseen = r.value.filter(f => !isFactSeen(f));
                    if (unseen.length > 0) return unseen;
                    return r.value;
                }
            }
            return [];
        }

        // ========== SEARCH TRACKING ==========
        function trackSearch(topic, foundResult) {
            try {
                const searches = JSON.parse(localStorage.getItem("smartass_searches") || "[]");
                const existing = searches.find(s => s.query.toLowerCase() === topic.toLowerCase());
                if (existing) {
                    existing.count++;
                    existing.lastSearched = new Date().toISOString();
                    existing.hadResult = foundResult;
                } else {
                    searches.push({
                        query: topic,
                        count: 1,
                        firstSearched: new Date().toISOString(),
                        lastSearched: new Date().toISOString(),
                        hadResult: foundResult
                    });
                }
                localStorage.setItem("smartass_searches", JSON.stringify(searches));
            } catch {}
        }

        // ========== SEARCH & DISPLAY ==========
        async function searchFacts(topic) {
            const factArea = document.getElementById("factArea");
            document.getElementById("searchInput").value = topic;
            currentTopic = topic;

            const curated = searchCuratedFacts(topic);

            if (curated.length > 0) {
                const unseen = curated.filter(f => !isFactSeen(f));
                const pick = unseen.length > 0 ? unseen[0] : curated[0];

                currentFacts = [{ ...pick, credibility: "high" }];
                currentRelated = (pick.related || []).filter(r => r.toLowerCase() !== topic.toLowerCase()).slice(0, 6);
                currentIndex = 0;
                currentIsApi = false;
                markFactSeen(currentFacts[0]);
                trackSearch(topic, true);
                renderSingleFact();
                return;
            }

            trackSearch(topic, false);
            factArea.innerHTML = `
                <div class="fact-card" style="text-align:center; padding: 2rem 1.5rem;">
                    <p style="font-size:1rem; margin-bottom:0.5rem;">😕</p>
                    <p style="font-size:0.95rem; font-weight:500; margin-bottom:0.75rem;">Tyvärr har vi ingen info om "${escapeHtml(topic)}" ännu</p>
                    <p style="font-size:0.82rem; color:var(--text-secondary); line-height:1.5;">Vi bygger ut vår faktabank varje dag! Testa att söka på något annat eller tryck på knappen nedan för en slumpmässig fakta.</p>
                </div>`;
        }

        async function fetchWikipediaFacts(topic) {
            try {
                const searchUrl = `https://sv.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(topic)}&limit=1&format=json&origin=*`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();

                let title, lang;
                if (searchData[1]?.length > 0) {
                    title = searchData[1][0];
                    lang = "sv";
                } else {
                    const enRes = await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(topic)}&limit=1&format=json&origin=*`);
                    const enData = await enRes.json();
                    if (!enData[1]?.length) return { facts: [], related: [] };
                    title = enData[1][0];
                    lang = "en";
                }

                const base = `https://${lang}.wikipedia.org`;
                const [summaryRes, linksRes] = await Promise.all([
                    fetch(`${base}/api/rest_v1/page/summary/${encodeURIComponent(title)}`),
                    fetch(`${base}/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=links&pllimit=20&format=json&origin=*`)
                ]);

                const summary = await summaryRes.json();
                const linksData = await linksRes.json();

                const facts = [];
                if (summary.extract) {
                    summary.extract.split(/(?<=[.!?])\s+/).filter(s => s.length > 30).forEach(text => {
                        facts.push({
                            text,
                            sourceName: "Wikipedia",
                            sourceUrl: summary.content_urls?.desktop?.page || `${base}/wiki/${encodeURIComponent(title)}`,
                            credibility: "medium"
                        });
                    });
                }

                const related = [];
                const pages = linksData.query?.pages;
                if (pages) {
                    const page = Object.values(pages)[0];
                    page?.links?.filter(l => l.ns === 0 && !l.title.includes(":")).slice(0, 10).forEach(l => related.push(l.title));
                }

                return { facts, related };
            } catch (e) {
                console.error("Wikipedia error:", e);
                return { facts: [], related: [] };
            }
        }

        const TOPIC_API_MAP = [
            { keywords: ["rymd", "nasa", "astro", "planet", "stjärn", "galax", "sol", "mars", "jupiter", "saturn", "asteroid", "meteor", "teleskop", "komet", "iss", "rymdstation", "astronaut"], apis: ["nasaApod", "nasaAsteroids", "peopleInSpace"] },
            { keywords: ["nobel", "pris", "vetenskap", "fysik", "kemi", "medicin", "fred"], apis: ["nobelPrize"] },
            { keywords: ["jordbävning", "geologi", "tektonik", "vulkan", "seism", "richter", "tsunami"], apis: ["usgsEarthquakes"] },
            { keywords: ["geografi", "land", "länder", "kontinent", "huvudstad", "befolkning", "europa", "afrika", "asien", "amerika", "oceanien"], apis: ["restCountries", "worldBank"] },
            { keywords: ["konst", "museum", "målning", "skulptur", "tavla", "konstnär", "met", "renässans", "mode", "design"], apis: ["metMuseum", "europeana"] },
            { keywords: ["bok", "böcker", "litteratur", "författare", "roman", "poesi", "bibliotek"], apis: ["openLibrary"] },
            { keywords: ["pokémon", "pokemon", "pikachu", "nintendo"], apis: ["pokeApi"] },
            { keywords: ["valuta", "kronor", "dollar", "euro", "växelkurs", "pengar"], apis: ["frankfurter"] },
            { keywords: ["ekonomi", "bnp", "statistik", "befolkning", "utveckling", "fattigdom"], apis: ["worldBank"] },
            { keywords: ["djur", "arter", "biologi", "natur", "biodiversitet", "fågel", "däggdjur", "fisk", "insekt"], apis: ["gbif"] },
            { keywords: ["kulturarv", "viking", "runsten", "arkeologi", "fornfynd", "medeltid", "järnålder", "bronsålder", "hällristning"], apis: ["kSamsok", "europeana"] },
            { keywords: ["europa", "kultur", "historia", "antik", "barock", "gotik"], apis: ["europeana"] }
        ];

        async function fetchTopicApiFacts(topic) {
            const q = topic.toLowerCase();
            const apiSet = new Set();

            for (const mapping of TOPIC_API_MAP) {
                if (mapping.keywords.some(k => q.includes(k))) {
                    mapping.apis.forEach(a => apiSet.add(a));
                }
            }

            if (apiSet.size === 0) {
                ["nobelPrize", "restCountries", "europeana", "gbif", "openLibrary"].forEach(a => apiSet.add(a));
            }

            const facts = [];
            try {
                const results = await Promise.allSettled(
                    [...apiSet].map(name => API_SOURCES[name]?.() || Promise.resolve([]))
                );
                results.forEach(r => {
                    if (r.status === "fulfilled") facts.push(...r.value);
                });
            } catch (e) {
                console.warn("API topic search error:", e);
            }

            const unseen = facts.filter(f => !isFactSeen(f));
            return unseen.length > 0 ? unseen : facts;
        }

        async function renderSingleFact() {
            const factArea = document.getElementById("factArea");
            const fact = currentFacts[currentIndex];
            const credClass = `cred-${fact.credibility}`;
            const label = credibilityLabel(fact.credibility);

            const sourceHtml = fact.sourceName
                ? `<a href="${escapeHtml(fact.sourceUrl || '#')}" target="_blank" rel="noopener" class="source-link">Källa: ${escapeHtml(fact.sourceName)}</a>`
                : "";

            // Check if saved (async)
            let isSaved = false;
            if (currentUser) {
                try { isSaved = await isFactSavedByUser(fact); } catch {}
            }

            const actionsHtml = `
                <div class="fact-actions">
                    <button class="fact-action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSaveFact(currentFacts[currentIndex])">
                        ${isSaved ? '❤️ Sparad' : '🤍 Spara'}
                    </button>
                    <button class="fact-action-btn" onclick="openShare(currentFacts[currentIndex])">
                        📩 Skicka till vän
                    </button>
                </div>`;

            let html = `
                <div class="fact-card">
                    <div class="fact-text">${escapeHtml(fact.text)}</div>
                    <div class="fact-footer">
                        <div class="credibility ${credClass}">
                            <span class="cred-dot"></span>
                            <span>Trovärdighet: </span>
                            <span class="cred-label">${label}</span>
                        </div>
                        ${sourceHtml}
                    </div>
                    ${actionsHtml}
                </div>`;

            if (currentRelated.length > 0) {
                html += `
                    <div class="related-section">
                        <div class="related-label">Utforska vidare</div>
                        <div class="related-topics">
                            ${currentRelated.map(t => `<button class="topic-pill" onclick="searchFacts('${escapeHtml(t.replace(/'/g, "\\'"))}')">${escapeHtml(t)}</button>`).join("")}
                        </div>
                    </div>`;
            }

            factArea.innerHTML = html;
        }

        // ========== INIT ==========
        loadPublishedFacts();

        // ========== EVENT LISTENERS ==========
        document.getElementById("searchForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const topic = document.getElementById("searchInput").value.trim();
            if (topic) searchFacts(topic);
        });

        document.getElementById("randomBtn").addEventListener("click", async () => {
            const allFacts = getAllFacts();
            if (allFacts.length === 0) {
                document.getElementById("factArea").innerHTML = `
                    <div class="error-msg">Inga publicerade fakta ännu. Godkänn och publicera fakta via admin-panelen!</div>`;
                return;
            }
            const unseen = allFacts.filter(f => !isFactSeen(f));
            const pool = unseen.length > 0 ? unseen : allFacts;
            const randomFact = pool[Math.floor(Math.random() * pool.length)];
            const fact = { ...randomFact, credibility: "high" };

            currentFacts = [fact];
            currentRelated = fact.related || [];
            currentIndex = 0;
            currentTopic = fact.keywords?.[0] || "";
            document.getElementById("searchInput").value = "";
            markFactSeen(fact);
            renderSingleFact();
        });
    </script>
</body>
</html>
